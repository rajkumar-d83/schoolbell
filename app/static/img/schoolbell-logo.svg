<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bell-gold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#FDE68A"/>
      <stop offset="40%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="cap-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#334155"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#FFFBEB" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#FDE68A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#B45309" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- White circular badge background -->
  <circle cx="100" cy="100" r="97" fill="white"/>
  <!-- Gold ring border -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#FBBF24" stroke-width="4"/>
  <circle cx="100" cy="100" r="91" fill="none" stroke="#FDE68A" stroke-width="1" opacity="0.6"/>

  <!-- Graduation cap board (sits on top of bell) -->
  <rect x="52" y="38" width="96" height="9" rx="2" fill="url(#cap-grad)"/>
  <!-- Cap crown (top block) -->
  <rect x="80" y="24" width="40" height="16" rx="2" fill="url(#cap-grad)"/>
  <!-- Cap tassel string -->
  <line x1="146" y1="42" x2="154" y2="62" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tassel pom-pom -->
  <circle cx="154" cy="66" r="5" fill="#FBBF24"/>
  <line x1="152" y1="70" x2="150" y2="77" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="154" y1="71" x2="154" y2="78" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="156" y1="70" x2="158" y2="77" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bell neck (connects cap to bell body) -->
  <rect x="90" y="47" width="20" height="12" rx="2" fill="#FBBF24"/>

  <!-- Bell body -->
  <path d="M100,59
           C 80,59  62,72  58,92
           L 52,138
           L 148,138
           L 142,92
           C 138,72  120,59  100,59 Z"
        fill="url(#bell-gold)" filter="url(#shadow)"/>

  <!-- Bell inner glow (lightbulb effect) -->
  <ellipse cx="100" cy="108" rx="28" ry="30" fill="url(#glow)"/>

  <!-- Lightbulb outline inside bell -->
  <circle cx="100" cy="102" r="16" fill="none" stroke="#FDE68A" stroke-width="1.5" opacity="0.7"/>
  <!-- Filament -->
  <path d="M95,102 L100,110 L105,102" fill="none" stroke="#FFFBEB" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Bell bottom rim (wider than body, slight curve) -->
  <path d="M42,138 Q100,150 158,138 L158,145 Q100,158 42,145 Z"
        fill="#D97706"/>

  <!-- Bell clapper rod -->
  <line x1="100" y1="145" x2="100" y2="158" stroke="#B45309" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Clapper ball -->
  <circle cx="100" cy="164" r="7" fill="#B45309" stroke="#92400E" stroke-width="1.5"/>
</svg>
