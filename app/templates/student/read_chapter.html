{% extends "shared/base.html" %}
{% block title %}{{ chapter.title }} – SchoolBell{% endblock %}

{% block extra_head %}
<style>
  body { overflow: hidden; }
  main { padding: 0 !important; animation: none; }
  .reader-layout {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 60px);
  }
  .reader-topbar {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: .6rem 1.25rem;
    background: rgba(52,211,153,.1);
    border-bottom: 1px solid rgba(52,211,153,.2);
    flex-shrink: 0;
  }
  .reader-topbar a { color: var(--emerald,#34D399); opacity: .85; text-decoration: none; font-size: .875rem; font-weight: 500; }
  .reader-topbar a:hover { opacity: 1; }
  .reader-title { font-weight: 700; font-size: .95rem; margin: 0 auto 0 0; color: var(--text-primary,#E2E8F0); }
</style>
{% endblock %}

{% block content %}
<div class="reader-layout">

  <!-- Top bar -->
  <div class="reader-topbar">
    <a href="{{ url_for('student.chapters', subject_id=subject.id) }}">← Back</a>
    <span class="reader-title">{{ subject.name }} · {{ chapter.title }}</span>
  </div>

  <!-- PDF canvas -->
  <div class="pdf-canvas-wrap" id="canvas-wrap">
    <div class="pdf-loading" id="pdf-loading">
      <span>Loading PDF…</span>
    </div>
    <canvas id="pdf-canvas" style="display:none;"></canvas>
  </div>

  <!-- Controls -->
  <div class="pdf-controls">
    <button class="pdf-btn" onclick="updatePage(currentPage - 1)">◀ Prev</button>
    <span class="page-indicator" id="page-indicator">Page — of —</span>
    <button class="pdf-btn" onclick="updatePage(currentPage + 1)">Next ▶</button>
    <div class="pdf-ctrl-sep"></div>
    <button class="pdf-btn" onclick="changeZoom(-0.25)">−</button>
    <span class="zoom-label" id="zoom-label">150%</span>
    <button class="pdf-btn" onclick="changeZoom(0.25)">+</button>
    <div class="pdf-ctrl-sep"></div>
    <button class="pdf-btn" onclick="toggleFullscreen()">⛶</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PDF_URL = "{{ url_for('parent.serve_pdf', chapter_id=chapter.id) }}";

let pdfDoc      = null;
let currentPage = 1;
let numPages    = 0;
let scale       = 1.5;
let renderTask  = null;

const canvas    = document.getElementById('pdf-canvas');
const ctx       = canvas.getContext('2d');
const indicator = document.getElementById('page-indicator');
const loading   = document.getElementById('pdf-loading');
const zoomLabel = document.getElementById('zoom-label');

pdfjsLib.getDocument(PDF_URL).promise
  .then(doc => {
    pdfDoc   = doc;
    numPages = doc.numPages;
    loading.style.display = 'none';
    canvas.style.display  = 'block';
    renderPage(currentPage);
  })
  .catch(err => {
    loading.innerHTML = '<span style="color:#ff6b6b">Failed to load PDF.</span>';
    console.error(err);
  });

async function renderPage(n) {
  if (!pdfDoc) return;
  if (renderTask) { renderTask.cancel(); }
  const page     = await pdfDoc.getPage(n);
  const viewport = page.getViewport({ scale });
  canvas.width   = viewport.width;
  canvas.height  = viewport.height;
  renderTask = page.render({ canvasContext: ctx, viewport });
  await renderTask.promise;
  indicator.textContent = `Page ${n} of ${numPages}`;
  zoomLabel.textContent = Math.round(scale * 100) + '%';
}

function updatePage(n) {
  n = Math.max(1, Math.min(numPages || 1, n));
  if (n === currentPage && pdfDoc) return;
  currentPage = n;
  renderPage(currentPage);
}

function changeZoom(delta) {
  scale = Math.max(0.5, Math.min(3.0, scale + delta));
  renderPage(currentPage);
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.querySelector('.reader-layout').requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  updatePage(currentPage - 1);
  if (e.key === 'ArrowRight') updatePage(currentPage + 1);
});
</script>
{% endblock %}
