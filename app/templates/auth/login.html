{% extends "shared/base.html" %}
{% block title %}Login – SchoolBell{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='img/schoolbell-logo.png') }}"
           alt="SchoolBell" style="width:260px; max-width:100%; border-radius:12px;">
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" name="username" id="username" class="form-control"
               placeholder="Enter your username" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" name="password" id="password" class="form-control"
               placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-full">Log In →</button>
    </form>

    {% if has_unclaimed %}
    <div style="margin-top:1.5rem; padding-top:1.25rem; border-top:1px solid var(--border); text-align:center;">
      <p style="font-size:.82rem; color:var(--text-muted); margin-bottom:.6rem;">
        First time here?
      </p>
      <a href="{{ url_for('auth.claim') }}"
         style="display:inline-flex; align-items:center; gap:.5rem; font-size:.9rem; font-weight:600;
                color:var(--emerald); text-decoration:none; padding:.5rem 1rem;
                background:var(--emerald-bg); border:1px solid rgba(52,211,153,.25);
                border-radius:var(--radius); transition:all var(--transition);"
         onmouseover="this.style.background='rgba(52,211,153,.18)'"
         onmouseout="this.style.background='var(--emerald-bg)'">
        🎓 I'm a new student — set up my account
      </a>
    </div>
    {% endif %}

    <p style="text-align:center; margin-top:1.25rem; font-size:.78rem; color:var(--text-muted);">
      CBSE Learning Portal
    </p>
  </div>
</div>
{% endblock %}
